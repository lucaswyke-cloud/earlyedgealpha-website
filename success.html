<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — EarlyEdgeAlpha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --deep: #0d0d0d;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.06);
    --white: #F0EDE6;
    --muted: rgba(240,237,230,0.4);
    --green: #4ADE80;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--white);
    text-transform: uppercase;
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 140px 48px 100px;
    position: relative;
    overflow: hidden;
  }

  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 50% 50%, rgba(74,222,128,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 540px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.9s 0.2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.3);
    padding: 8px 20px;
    margin-bottom: 48px;
  }
  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(44px, 7vw, 72px);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }
  .card h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .card p {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 48px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 48px;
  }

  .btn-primary {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Instrument Sans', sans-serif;
    background: var(--gold);
    color: var(--black);
    padding: 16px 40px;
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s, transform 0.2s;
    margin-bottom: 28px;
  }
  .btn-primary:hover {
    opacity: 0.88;
    transform: translateY(-1px);
  }

  .support-note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    opacity: 0.6;
    line-height: 1.8;
  }
  .support-note a {
    color: var(--gold);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .support-note a:hover { opacity: 0.7; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--deep);
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .footer-logo span { color: var(--gold); }
  .footer-copy {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    opacity: 0.5;
  }
  .footer-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .footer-links a {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--white); }

  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    main { padding: 120px 24px 80px; }
    footer { flex-direction: column; gap: 20px; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Early<span>Edge</span>Alpha</a>
</nav>

<main>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="status-badge">Payment Confirmed</div>
    <h1>Payment <em>Successful.</em></h1>
    <p>Your EarlyEdgeAlpha subscription is now active.</p>
    <div class="divider"></div>
    <a href="#" class="btn-primary">Download Extension</a>
    <br>
    <p class="support-note">
      If you don't receive access within 5 minutes,<br>
      contact <a href="mailto:earlyedgealpha@gmail.com">earlyedgealpha@gmail.com</a>
    </p>
  </div>
</main>

<footer>
  <div class="footer-logo">Early<span>Edge</span>Alpha</div>
  <p class="footer-copy">© 2026 EarlyEdgeAlpha. All rights reserved.</p>
  <ul class="footer-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="terms.html">Terms</a></li>
    <li><a href="privacy.html">Privacy</a></li>
  </ul>
</footer>

</body>
</html>
